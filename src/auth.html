<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlmaTour – Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="auth.css">
</head>
<body>
 
<div class="auth-layout">
 
  <!-- LEFT: scenic photo -->
  <div class="auth-left">
    <div class="auth-left-bg" id="leftBg"></div>
    <div class="auth-left-overlay"></div>
    <a href="#" class="auth-logo">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M21.5 3C20.1 3 18.8 3.5 17.8 4.4C17 3.5 15.8 3 14.5 3C11.5 3 9 5.5 9 8.5C9 12 11.5 14.8 14.9 17.8C15.8 18.6 16.8 19.4 17.8 20.3C18.8 19.4 19.8 18.6 20.7 17.8C24.1 14.8 26.6 12 26.6 8.5C26.5 5.5 24.3 3 21.5 3Z" fill="#2563EB"/>
        <path d="M17.8 26C17 25.3 16.3 24.7 15.6 24.1C12 21 9 18 9 13.5C9 12.5 9.2 11.5 9.5 10.6C8 11.8 7 13.8 7 16C7 21 12 25 17.8 29C23.6 25 28.6 21 28.6 16C28.6 14.8 28.3 13.7 27.8 12.7C27.6 13 27.4 13.4 27.1 13.7C26.9 18.5 22.8 22.4 17.8 26Z" fill="#1D4ED8"/>
      </svg>
      AlmaTour
    </a>
  </div>
 
  <!-- RIGHT: form -->
  <div class="auth-right">
    <div class="auth-card">
 
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" onclick="switchTab('register')">Register</button>
      </div>
 
      <!-- LOGIN PANEL -->
      <div class="auth-panel active" id="loginPanel">
        <h1 class="auth-heading">Welcome Back</h1>
        <p class="auth-sub">Login to continue your journey</p>
 
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="loginEmail" placeholder="Value" autocomplete="email">
        </div>
 
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="Value" autocomplete="current-password">
        </div>
 
        <p class="msg" id="loginMsg"></p>
        <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Login</button>
      </div>
 
      <!-- REGISTER PANEL -->
      <div class="auth-panel" id="registerPanel">
        <h1 class="auth-heading">Create Account</h1>
        <p class="auth-sub">Sign up to start your journey with us</p>
 
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="regName" placeholder="Value" autocomplete="name">
        </div>
 
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="regEmail" placeholder="Value" autocomplete="email">
        </div>
 
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="regPassword" placeholder="Value" autocomplete="new-password">
        </div>
 
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" id="regConfirm" placeholder="Value" autocomplete="new-password">
        </div>
 
        <p class="msg" id="registerMsg"></p>
        <button class="btn-submit" id="registerBtn" onclick="handleRegister()">Sign Up</button>
      </div>
 
    </div>
  </div>
</div>
 
<script src="auth.js"></script>
</body>
</html>
